<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>跟越南移工認識的經過 ─ 完整真實紀錄</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="scroll-progress-bar" id="scrollProgressBar"></div>
    <main class="page-shell">
      <!-- 載入區：header -->
      <div id="section-header"></div>

      <!-- 載入區：導航列 -->
      <div id="section-nav"></div>

      <!-- 載入區：前情提要 -->
      <div id="section-intro"></div>

      <!-- 時間軸容器 -->
      <div class="timeline" id="section-timeline"></div>

      <!-- 載入區：心理分析 -->
      <div id="section-analysis"></div>

      <!-- 載入區：完整分析報告 -->
      <div id="section-analysis-full"></div>
    </main>

    <!-- 載入區：頁尾 -->
    <div id="section-footer"></div>

    <script>
      /**
       * 章節載入器
       * 依序載入各 HTML 片段並插入對應容器
       */
      (function () {
        'use strict';

        /** @type {Array<{container: string, file: string}>} 載入清單 */
        var sections = [
          { container: 'section-header', file: 'sections/header.html' },
          { container: 'section-nav', file: 'sections/nav.html' },
          { container: 'section-intro', file: 'sections/intro.html' },
          // 時間軸月份（全部載入到同一容器）
          { container: 'section-timeline', file: 'sections/month-01.html' },
          { container: 'section-timeline', file: 'sections/month-02.html' },
          { container: 'section-timeline', file: 'sections/month-03.html' },
          { container: 'section-timeline', file: 'sections/month-04.html' },
          { container: 'section-timeline', file: 'sections/month-05.html' },
          { container: 'section-timeline', file: 'sections/month-06.html' },
          { container: 'section-timeline', file: 'sections/month-07.html' },
          { container: 'section-timeline', file: 'sections/month-08.html' },
          { container: 'section-timeline', file: 'sections/month-09.html' },
          { container: 'section-timeline', file: 'sections/month-10.html' },
          { container: 'section-timeline', file: 'sections/month-11.html' },
          { container: 'section-timeline', file: 'sections/month-12.html' },
          { container: 'section-timeline', file: 'sections/month-2026.html' },
          { container: 'section-analysis', file: 'sections/analysis.html' },
          {
            container: 'section-analysis-full',
            file: 'sections/analysis-full.html',
          },
          { container: 'section-footer', file: 'sections/footer.html' },
        ];

        /**
         * 依序載入所有章節
         * 使用 Promise 鏈確保載入順序正確
         */
        function loadAllSections() {
          var chain = Promise.resolve();

          sections.forEach(function (section) {
            chain = chain.then(function () {
              return loadSection(section.container, section.file);
            });
          });

          chain
            .then(function () {
              console.log('所有章節載入完成');
              initScrollProgressBar();
              initFadeInAnimation();
            })
            .catch(function (error) {
              console.error('章節載入過程中發生錯誤:', error);
            });
        }

        /**
         * 載入單一章節 HTML 片段
         * @param {string} containerId - 容器元素 ID
         * @param {string} filePath - HTML 片段檔案路徑
         * @returns {Promise<void>}
         */
        function loadSection(containerId, filePath) {
          return fetch(filePath)
            .then(function (response) {
              if (!response.ok) {
                throw new Error(
                  '載入 ' + filePath + ' 失敗: ' + response.status
                );
              }
              return response.text();
            })
            .then(function (html) {
              var container = document.getElementById(containerId);
              if (container) {
                // 使用 insertAdjacentHTML 以追加方式插入（同一容器可載入多個片段）
                container.insertAdjacentHTML('beforeend', html);
              }
            })
            .catch(function (error) {
              console.error('載入章節失敗 [' + filePath + ']:', error);
            });
        }

        /**
         * 滾動進度條
         */
        function initScrollProgressBar() {
          var progressBar = document.getElementById('scrollProgressBar');

          function updateProgressBar() {
            try {
              if (!progressBar) return;
              var windowHeight =
                document.documentElement.scrollHeight - window.innerHeight;
              var scrolled =
                windowHeight > 0 ? (window.scrollY / windowHeight) * 100 : 0;
              progressBar.style.width = scrolled + '%';
            } catch (error) {
              console.warn('進度條更新失敗:', error);
            }
          }

          window.addEventListener('scroll', updateProgressBar);
          updateProgressBar();
        }

        /**
         * 滾動淡入動畫
         * 使用 IntersectionObserver 監聽區塊進入視窗
         */
        function initFadeInAnimation() {
          try {
            var targets = document.querySelectorAll(
              '.section, .timeline-item, header'
            );
            if (!targets.length || !('IntersectionObserver' in window)) {
              for (var i = 0; i < targets.length; i++) {
                targets[i].classList.add('visible');
              }
              return;
            }

            var observer = new IntersectionObserver(
              function (entries) {
                entries.forEach(function (entry) {
                  if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    observer.unobserve(entry.target);
                  }
                });
              },
              { threshold: 0.08, rootMargin: '0px 0px -40px 0px' }
            );

            targets.forEach(function (el) {
              observer.observe(el);
            });
          } catch (error) {
            console.warn('淡入動畫初始化失敗:', error);
            var fallback = document.querySelectorAll(
              '.section, .timeline-item, header'
            );
            for (var k = 0; k < fallback.length; k++) {
              fallback[k].classList.add('visible');
            }
          }
        }

        // 頁面載入後啟動
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', loadAllSections);
        } else {
          loadAllSections();
        }
      })();

      /**
       * 心理分析標籤切換功能
       * @param {string} tabId - 標籤識別碼 ('neutral' | 'spicy' | 'ultimate')
       */
      function switchAnalysisTab(tabId) {
        try {
          var panels = document.querySelectorAll('.analysis-tab-panel');
          for (var i = 0; i < panels.length; i++) {
            panels[i].classList.remove('active');
          }

          var btns = document.querySelectorAll('.analysis-tab-btn');
          for (var j = 0; j < btns.length; j++) {
            btns[j].classList.remove(
              'active',
              'active-spicy',
              'active-ultimate'
            );
          }

          var targetPanel = document.getElementById('tab-' + tabId);
          if (targetPanel) {
            targetPanel.classList.add('active');
          }

          var targetBtn = document.querySelector(
            '.analysis-tab-btn[data-tab="' + tabId + '"]'
          );
          if (targetBtn) {
            if (tabId === 'spicy') {
              targetBtn.classList.add('active-spicy');
            } else if (tabId === 'ultimate') {
              targetBtn.classList.add('active-ultimate');
            } else {
              targetBtn.classList.add('active');
            }
          }

          console.log('已切換至分析標籤:', tabId);
        } catch (error) {
          console.error('標籤切換失敗:', error);
        }
      }
    </script>
  </body>
</html>
